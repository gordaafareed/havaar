<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>havaar — dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --panel: #101010;
            --panel2: #141414;
            --border: #1e1e1e;
            --border2: #2a2a2a;
            --text: #d8d8d8;
            --dim: #484848;
            --dim2: #333;
            --accent: #c0392b;
            --green: #27ae60;
            --yellow: #e67e22;
            --blue: #2980b9;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── topbar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--dim);
            display: inline-block;
            transition: background 0.3s;
        }

        .status-dot.live {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .status-text {
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--dim);
            text-transform: uppercase;
        }

        .btn-sm {
            background: none;
            border: 1px solid var(--border2);
            color: var(--dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-sm:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── layout ── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── sidebar ── */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--dim);
        }

        .badge {
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 2px;
            min-width: 18px;
            text-align: center;
        }

        .badge.hidden {
            display: none;
        }

        .call-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }

        .call-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            position: relative;
        }

        .call-item:hover {
            background: var(--panel2);
        }

        .call-item.active {
            background: var(--panel2);
            border-left: 2px solid var(--accent);
        }

        .call-item.unread::after {
            content: '';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        .call-number {
            font-size: 12px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .call-label {
            font-size: 10px;
            color: var(--blue);
            margin-bottom: 4px;
        }

        .call-time {
            font-size: 10px;
            color: var(--dim);
        }

        /* ── default greeting panel ── */
        .default-panel {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* ── main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-header {
            padding: 20px 28px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .caller-number {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .caller-meta {
            font-size: 10px;
            color: var(--dim);
            display: flex;
            gap: 16px;
            margin-bottom: 10px;
        }

        .label-input {
            background: none;
            border: none;
            border-bottom: 1px solid var(--border2);
            color: var(--blue);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            padding: 2px 4px;
            outline: none;
            width: 220px;
            transition: border-color 0.15s;
        }

        .label-input:focus {
            border-bottom-color: var(--blue);
        }

        .label-input::placeholder {
            color: var(--dim2);
        }

        .main-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dim);
            gap: 12px;
        }

        .empty-icon {
            font-size: 32px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ── section label ── */
        .section-label {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 12px;
        }

        /* ── audio entry ── */
        .audio-entry {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }

        .play-btn:hover {
            opacity: 0.8;
        }

        .play-btn.playing {
            background: var(--yellow);
        }

        .audio-info {
            flex: 1;
            min-width: 0;
        }

        .audio-time {
            font-size: 10px;
            color: var(--dim);
            margin-bottom: 4px;
        }

        .audio-waveform {
            height: 28px;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .audio-progress {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: rgba(192, 57, 43, 0.15);
            transition: width 0.1s linear;
            pointer-events: none;
        }

        .waveform-bars {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 100%;
            padding: 4px 8px;
        }

        .wbar {
            width: 2px;
            background: var(--dim);
            border-radius: 1px;
        }

        /* ── reply box ── */
        .reply-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
        }

        .reply-status {
            font-size: 10px;
            color: var(--dim);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dim);
            display: inline-block;
        }

        .dot.active {
            background: var(--green);
        }

        .record-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-record {
            background: var(--accent);
            border: none;
            color: #fff;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-record:hover {
            opacity: 0.85;
        }

        .btn-record.recording {
            background: var(--yellow);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .btn-action {
            background: none;
            border: 1px solid var(--border2);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 9px 18px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-action:hover {
            border-color: var(--green);
            color: var(--green);
        }

        .btn-action.del:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-action:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .rec-timer {
            font-size: 11px;
            color: var(--yellow);
            min-width: 40px;
        }

        .preview-player {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-left">
            <div class="logo">// havaar</div>
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">checking…</span>
        </div>
        <button class="btn-sm" onclick="logout()">logout</button>
    </div>

    <div class="layout">

        <!-- ── sidebar ── -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">calls</span>
                <span class="badge hidden" id="unreadBadge"></span>
            </div>

            <div class="call-list" id="callList">
                <div style="padding:20px;font-size:11px;color:var(--dim);text-align:center;margin-top:20px;">
                    no calls yet
                </div>
            </div>

            <!-- default greeting -->
            <div class="default-panel">
                <div class="section-label">default greeting</div>
                <div class="reply-status">
                    <span class="dot" id="defaultDot"></span>
                    <span id="defaultStatusText">not recorded</span>
                </div>
                <div class="record-controls">
                    <button class="btn-record" id="btnDefault" onclick="toggleRecording('default')">
                        <span class="rec-dot"></span>
                        <span id="btnDefaultLabel">record</span>
                    </button>
                    <button class="btn-action" id="btnPlayDefault" style="display:none"
                        onclick="playAudio('/api/audio/outbound/default.wav')">play</button>
                    <button class="btn-action del" id="btnDeleteDefault" style="display:none"
                        onclick="deleteDefault()">delete</button>
                </div>
                <div class="rec-timer" id="defaultTimer"></div>
            </div>
        </div>

        <!-- ── main ── -->
        <div class="main">

            <!-- empty state -->
            <div id="emptyState" class="main-body">
                <div class="empty-state">
                    <div class="empty-icon">📞</div>
                    <div class="empty-text">select a call</div>
                </div>
            </div>

            <!-- call detail -->
            <div id="callDetail" style="display:none;flex:1;flex-direction:column;overflow:hidden;">

                <div class="main-header">
                    <div class="caller-number" id="detailNumber"></div>
                    <div class="caller-meta">
                        <span id="detailCount"></span>
                        <span id="detailLast"></span>
                    </div>
                    <input class="label-input" id="labelInput" placeholder="add a name or label…" onblur="saveLabel()"
                        onkeydown="if(event.key==='Enter')this.blur()">
                </div>

                <div class="main-body">

                    <!-- incoming messages -->
                    <div>
                        <div class="section-label">messages from caller</div>
                        <div id="incomingList"></div>
                    </div>

                    <!-- reply -->
                    <div>
                        <div class="section-label">your reply <span style="color:var(--dim)">(plays on next call)</span>
                        </div>
                        <div class="reply-box">
                            <div class="reply-status">
                                <span class="dot" id="replyDot"></span>
                                <span id="replyStatusText">no reply recorded</span>
                            </div>
                            <div class="record-controls">
                                <button class="btn-record" id="btnReply" onclick="toggleRecording('reply')">
                                    <span class="rec-dot"></span>
                                    <span id="btnReplyLabel">record reply</span>
                                </button>
                                <button class="btn-action" id="btnPlayReply" style="display:none"
                                    onclick="playReply()">play</button>
                                <button class="btn-action del" id="btnDeleteReply" style="display:none"
                                    onclick="deleteReply()">delete</button>
                                <span class="rec-timer" id="replyTimer"></span>
                            </div>
                            <div class="preview-player" id="previewPlayer" style="display:none;">
                                <div class="section-label">preview</div>
                                <audio id="replyAudio" controls
                                    style="width:100%;filter:invert(1) hue-rotate(180deg);"></audio>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <audio id="bgAudio"></audio>

    <script>
        // ── state ──────────────────────────────────────────────────────────────────────
        let calls = [];
        let contacts = {};
        let activeSafeId = null;
        let activeCaller = null;

        // recording state
        let mediaRecorder = null;
        let chunks = [];
        let recTarget = null; // 'reply' | 'default'
        let recSeconds = 0;
        let recInterval = null;
        let isRecording = false;

        // playback state
        let currentAudio = null;
        let progInterval = null;
        let currentProgEl = null;
        let currentBtnEl = null;

        // ── boot ───────────────────────────────────────────────────────────────────────
        async function init() {
            await checkStatus();
            await refresh();
            setInterval(refresh, 8000);
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('statusDot').classList.toggle('live', data.ok);
                document.getElementById('statusText').textContent = data.ok ? 'live' : 'error';
                updateDefaultUI(data.default_greeting);
            } catch {
                document.getElementById('statusText').textContent = 'offline';
            }
        }

        async function refresh() {
            const [callsRes, contactsRes] = await Promise.all([
                fetch('/api/calls'),
                fetch('/api/contacts'),
            ]);
            if (callsRes.ok) calls = await callsRes.json();
            if (contactsRes.ok) contacts = await contactsRes.json();
            renderCallList();
            if (activeSafeId) renderDetail(activeSafeId);
            updateUnread();
        }

        // ── call list ──────────────────────────────────────────────────────────────────
        function renderCallList() {
            const el = document.getElementById('callList');
            if (!calls.length) {
                el.innerHTML = '<div style="padding:20px;font-size:11px;color:var(--dim);text-align:center;margin-top:20px;">no calls yet</div>';
                return;
            }

            // group by safe_id
            const grouped = {};
            for (const c of calls) {
                if (!grouped[c.safe_id]) grouped[c.safe_id] = [];
                grouped[c.safe_id].push(c);
            }

            el.innerHTML = Object.entries(grouped).map(([sid, items]) => {
                const latest = items[0];
                const unread = items.some(i => !i.listened);
                const label = contacts[sid]?.label || '';
                const active = sid === activeSafeId ? 'active' : '';
                const unreadCl = unread ? 'unread' : '';
                return `
      <div class="call-item ${active} ${unreadCl}"
           onclick="selectCaller('${sid}','${escAttr(latest.caller)}')">
        <div class="call-number">${latest.caller}</div>
        ${label ? `<div class="call-label">${esc(label)}</div>` : ''}
        <div class="call-time">${relTime(latest.timestamp)} · ${items.length} call${items.length > 1 ? 's' : ''}</div>
      </div>`;
            }).join('');
        }

        function updateUnread() {
            const n = calls.filter(c => !c.listened).length;
            const b = document.getElementById('unreadBadge');
            b.textContent = n;
            b.classList.toggle('hidden', n === 0);
        }

        // ── select caller ──────────────────────────────────────────────────────────────
        async function selectCaller(safeId, caller) {
            activeSafeId = safeId;
            activeCaller = caller;

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('callDetail').style.display = 'flex';

            renderDetail(safeId);
            renderCallList();

            const unlistened = calls.filter(c => c.safe_id === safeId && !c.listened);
            await Promise.all(unlistened.map(c =>
                fetch(`/api/calls/${c.id}/listened`, { method: 'POST' })
                    .then(() => { c.listened = true; })
            ));
            updateUnread();
        }

        function renderDetail(safeId) {
            const items = calls.filter(c => c.safe_id === safeId);
            if (!items.length) return;

            const label = contacts[safeId]?.label || '';
            document.getElementById('detailNumber').textContent = items[0].caller;
            document.getElementById('detailCount').textContent = `${items.length} call${items.length > 1 ? 's' : ''}`;
            document.getElementById('detailLast').textContent = `last: ${relTime(items[0].timestamp)}`;
            document.getElementById('labelInput').value = label;

            document.getElementById('incomingList').innerHTML = items.map((c, i) => `
    <div class="audio-entry">
      <button class="play-btn" id="pb_${i}" onclick="playIncoming('${c.filename}',${i})">▶</button>
      <div class="audio-info">
        <div class="audio-time">${relTime(c.timestamp)}</div>
        <div class="audio-waveform">
          <div class="audio-progress" id="pr_${i}" style="width:0%"></div>
          <div class="waveform-bars">${bars()}</div>
        </div>
      </div>
    </div>`).join('');

            checkReply(safeId);
        }

        // ── playback ───────────────────────────────────────────────────────────────────
        function playIncoming(filename, idx) {
            stopPlayback();
            const audio = document.getElementById('bgAudio');
            audio.src = `/api/audio/incoming/${filename}`;
            audio.play();
            currentAudio = audio;
            currentProgEl = document.getElementById(`pr_${idx}`);
            currentBtnEl = document.getElementById(`pb_${idx}`);
            currentBtnEl.classList.add('playing');
            currentBtnEl.textContent = '⏹';
            progInterval = setInterval(() => {
                if (audio.duration)
                    currentProgEl.style.width = (audio.currentTime / audio.duration * 100) + '%';
            }, 200);
            audio.onended = stopPlayback;
        }

        function playAudio(url) {
            stopPlayback();
            const audio = document.getElementById('bgAudio');
            audio.src = url + '?t=' + Date.now();
            audio.play();
            currentAudio = audio;
        }

        function playReply() {
            const audio = document.getElementById('replyAudio');
            audio.src = `/api/audio/outbound/${activeSafeId}.wav?t=${Date.now()}`;
            document.getElementById('previewPlayer').style.display = 'block';
            audio.play();
        }

        function stopPlayback() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (currentProgEl) currentProgEl.style.width = '0%';
            if (currentBtnEl) { currentBtnEl.classList.remove('playing'); currentBtnEl.textContent = '▶'; }
            if (progInterval) clearInterval(progInterval);
            currentAudio = currentProgEl = currentBtnEl = progInterval = null;
        }

        // ── reply ui ───────────────────────────────────────────────────────────────────
        function checkReply(safeId) {
            fetch(`/api/audio/outbound/${safeId}.wav`, { method: 'HEAD' })
                .then(r => updateReplyUI(r.ok))
                .catch(() => updateReplyUI(false));
        }

        function updateReplyUI(exists) {
            document.getElementById('replyDot').classList.toggle('active', exists);
            document.getElementById('replyStatusText').textContent = exists
                ? 'reply recorded — plays on next call'
                : 'no reply recorded';
            document.getElementById('btnPlayReply').style.display = exists ? '' : 'none';
            document.getElementById('btnDeleteReply').style.display = exists ? '' : 'none';
        }

        async function deleteReply() {
            if (!confirm('Delete this reply?')) return;
            await fetch(`/api/outbound/${activeSafeId}`, { method: 'DELETE' });
            updateReplyUI(false);
            document.getElementById('previewPlayer').style.display = 'none';
        }

        // ── default greeting ui ────────────────────────────────────────────────────────
        function updateDefaultUI(exists) {
            document.getElementById('defaultDot').classList.toggle('active', exists);
            document.getElementById('defaultStatusText').textContent = exists ? 'recorded' : 'not recorded';
            document.getElementById('btnPlayDefault').style.display = exists ? '' : 'none';
            document.getElementById('btnDeleteDefault').style.display = exists ? '' : 'none';
        }

        async function deleteDefault() {
            if (!confirm('Delete default greeting?')) return;
            await fetch('/api/outbound/default', { method: 'DELETE' });
            updateDefaultUI(false);
        }

        // ── recording ──────────────────────────────────────────────────────────────────
        async function toggleRecording(target) {
            if (isRecording && recTarget === target) {
                stopRecording();
            } else {
                if (isRecording) stopRecording();
                await startRecording(target);
            }
        }

        async function startRecording(target) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                chunks = [];
                recTarget = target;
                isRecording = true;
                recSeconds = 0;

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => handleStop(stream);
                mediaRecorder.start();

                const btnId = target === 'reply' ? 'btnReply' : 'btnDefault';
                const labelId = target === 'reply' ? 'btnReplyLabel' : 'btnDefaultLabel';
                const timerId = target === 'reply' ? 'replyTimer' : 'defaultTimer';

                document.getElementById(btnId).classList.add('recording');
                document.getElementById(labelId).textContent = 'stop';
                recInterval = setInterval(() => {
                    recSeconds++;
                    document.getElementById(timerId).textContent = fmtSecs(recSeconds);
                }, 1000);
            } catch {
                alert('Microphone access denied.');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            clearInterval(recInterval);

            const btnId = recTarget === 'reply' ? 'btnReply' : 'btnDefault';
            const labelId = recTarget === 'reply' ? 'btnReplyLabel' : 'btnDefaultLabel';
            const timerId = recTarget === 'reply' ? 'replyTimer' : 'defaultTimer';

            document.getElementById(btnId).classList.remove('recording');
            document.getElementById(labelId).textContent = recTarget === 'reply' ? 'record reply' : 'record';
            document.getElementById(timerId).textContent = '';
            isRecording = false;
        }

        async function handleStop(stream) {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const form = new FormData();
            form.append('audio', blob, 'recording.webm');

            if (recTarget === 'default') {
                await fetch('/api/outbound/default', { method: 'POST', body: form });
                updateDefaultUI(true);
            } else {
                await fetch(`/api/outbound/${activeSafeId}`, { method: 'POST', body: form });
                updateReplyUI(true);
                const audio = document.getElementById('replyAudio');
                audio.src = URL.createObjectURL(blob);
                document.getElementById('previewPlayer').style.display = 'block';
            }
        }

        // ── label ──────────────────────────────────────────────────────────────────────
        async function saveLabel() {
            const label = document.getElementById('labelInput').value.trim();
            await fetch(`/api/contacts/${activeSafeId}/label`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ label }),
            });
            if (contacts[activeSafeId]) contacts[activeSafeId].label = label;
            renderCallList();
        }

        // ── logout ─────────────────────────────────────────────────────────────────────
        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // ── utils ──────────────────────────────────────────────────────────────────────
        function relTime(iso) {
            const d = new Date(iso + 'Z');
            const diff = Date.now() - d;
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            return d.toLocaleDateString();
        }

        function fmtSecs(s) {
            return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
        }
